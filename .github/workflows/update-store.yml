name: Update Store Data & Inject Pixel

# ---------------------------------------------------------
# THE 3 WAYS THIS ROBOT WAKES UP:
# ---------------------------------------------------------
on:
  # 1. Runs manually when you click the button in GitHub
  workflow_dispatch:

  # 2. Wakes up automatically if you upload/change HTML files or global.js
  push:
    paths:
      - '**/*.html'
      - 'global.js'

  # 3. Scheduled to run every day at 1:00 AM Dhaka time (19:00 UTC)
  schedule:
    - cron: '0 19 * * *'

permissions:
  contents: write 

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 🚀 Run Fetch Script (Google Sheets)
        run: node fetch-data.js

      - name: 🛠️ Hardcode Meta Pixel into HTML
        run: node inject-pixel.js
        
      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Notice we are adding BOTH products.json and all updated .html files now!
          git add products.json *.html
          
          git commit -m "🤖 Auto-updated products database & Meta Pixel" || echo "No changes to commit"
          git push
