<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>Menu</h3>
        <p style="padding:10px 0; border-bottom:1px solid #eee;">Men's Fashion</p>
        <p style="padding:10px 0; border-bottom:1px solid #eee;">Women's Fashion</p>

<!-- Header with Brand Logo & Expandable Search -->
<!-- Header with Center Brand Logo & Expandable Search -->
<header class="top-header" style="display: flex;">
    <i class="ri-menu-line menu-btn" onclick="toggleMenu()" style="position:relative; z-index:10;"></i>
    
    <!-- Brand Logo (Perfectly Centered) -->
    <!-- Brand Logo (Perfectly Centered) -->
<!-- Brand Logo (Perfectly Centered) -->
<div class="header-brand" id="home-brand" style="position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:5px; font-weight:bold; font-size:18px; color: black;">
    <img src="Images/LOGO.png" style="height: 40px; width: auto; object-fit: contain; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.4));">
</div>
    
    <!-- Search Icon (Pushed to Right) -->
    <div class="header-icons" id="home-header-icons" style="margin-left:auto; position:relative; z-index:10;">
        <i class="ri-search-line" onclick="toggleHomeSearch()"></i>
    </div>
    
    <!-- Hidden Search Box -->
    <div class="header-search-box" id="home-search-input-box" style="display:none; flex-grow:1; margin-left:10px; background:#f0f0f0; border-radius:20px; padding:5px 15px; align-items:center; position:relative; z-index:10;">
        <input type="text" id="home-search-val" placeholder="Search products..." style="width:100%; border:none; background:transparent; outline:none; font-size:14px;">
        <i class="ri-close-line" onclick="toggleHomeSearch()" style="font-size:20px; margin-left:10px;"></i>
    </div>
</header>

<!-- Dynamic Image Banner (Controlled by JSON) -->
<div class="promo-banner" id="home-promo-banner" style="display:none;">
    <img id="home-promo-banner-img" src="" alt="Promo Banner">
</div>

<!-- The sort bar is now automatically sticky via CSS. Initially imvisible -->
<div class="sort-bar" style="display:none;">
    
    <div class="sort-item active">Best Match</div>
    <div class="sort-item">Popularity</div>
    <div class="sort-item" id="sort-price-btn">Price <i class="ri-expand-up-down-line" id="price-icon"></i></div>
</div>

<!-- NEW: BREADCRUMB / MAP ARC CONTAINER -->
<div id="breadcrumb-container" style="display:none; padding: 10px 15px; font-size: 13px; background: var(--white); align-items: center; gap: 8px; margin-bottom: 5px; border-bottom: 1px solid var(--border);"></div>

    <!-- THIS IS THE EMPTY BOX FOR JAVASCRIPT -->
    <div class="product-grid" id="grid">
        <!-- JS will automatically put the JSON products here -->
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="ri-home-5-fill"></i> Home
        </a>
        <!-- Message Button (Updated) -->
<div class="nav-item" onclick="openMessenger()" style="cursor:pointer;">
    <i class="ri-message-3-line"></i> Message
</div>
        <a href="checkout.html" class="nav-item">
    <div class="cart-icon-wrapper">
        <i class="ri-shopping-cart-2-line"></i>
        <span class="cart-badge">0</span>
    </div>
    Cart
</a>
    </nav>
    
<script src="global.js"></script>
<script>
    let allProducts = [];
let currentProducts =[];
let baseFilteredProducts =[];
let priceSortDir = 'none';

// --- INFINITE SCROLL VARIABLES ---
let renderedCount = 0;
let ITEMS_PER_LOAD = 12; // Changed to 'let' so we can temporarily increase it
let gridProducts =[]; 

// --- 1. MIX PRODUCTS ---
function interleaveProducts(products) {
    if (!products || products.length === 0) return[];
    
    let typesMap = {};
    products.forEach(p => {
        let t = p.type ? String(p.type).trim() : 'Uncategorized';
        if (!typesMap[t]) typesMap[t] =[];
        typesMap[t].push(p);
    });
    
    let result =[];
    let keys = Object.keys(typesMap);
    let maxLength = keys.length > 0 ? Math.max(...Object.values(typesMap).map(arr => arr.length)) : 0;
    
    for(let i = 0; i < maxLength; i++) {
        keys.forEach(k => {
            if (typesMap[k] && typesMap[k][i]) result.push(typesMap[k][i]);
        });
    }
    return result;
}

function toggleSortBar(show) {
    const sortBar = document.querySelector('.sort-bar');
    if (sortBar) sortBar.style.display = show ? 'flex' : 'none';
}

// --- 2. INITIALIZE PAGE & RESTORE SCROLL POSITION ---
async function initShop() {
    const fetchedProducts = await getProducts();
    
    // Banner Logic
    const banners = fetchedProducts.filter(p => String(p.type).toLowerCase().includes('banner') || String(p.id).toLowerCase().includes('banner'));
    const activeBanners = banners.filter(b => b.in_stock === true);
    const bannerContainer = document.getElementById('home-promo-banner');
    const bannerImg = document.getElementById('home-promo-banner-img');
    
    if (activeBanners.length > 0 && bannerContainer && bannerImg) {
        bannerImg.src = activeBanners[activeBanners.length - 1].images[0];
        bannerContainer.style.display = 'block';
    } else if (bannerContainer) {
        bannerContainer.style.display = 'none';
    }

    // Shop Product Logic
    const inStockProducts = fetchedProducts.filter(p => p.in_stock === true && !String(p.type).toLowerCase().includes('banner') && !String(p.id).toLowerCase().includes('banner'));
    allProducts = interleaveProducts(inStockProducts);
    currentProducts = [...allProducts];
    baseFilteredProducts = [...allProducts]; // NEW: Set initial base state
    
    renderSidebarMenu();
    
    // RESTORE STATE FROM SESSION MEMORY
    const savedScroll = sessionStorage.getItem(STORE_ID + 'homeScrollPos');
    const savedCount = sessionStorage.getItem(STORE_ID + 'homeRenderCount');
    const savedSearch = sessionStorage.getItem(STORE_ID + 'homeSearchTerm');
    
    if (savedCount) ITEMS_PER_LOAD = parseInt(savedCount);
    
    const searchQuery = getUrlParam('search') || savedSearch;
    
    if (searchQuery) {
        const searchInput = document.getElementById('home-search-val');
        if (searchInput) {
            searchInput.value = searchQuery;
            document.getElementById('home-search-input-box').style.display = 'flex';
            document.getElementById('home-brand').style.display = 'none';
            document.getElementById('home-header-icons').style.display = 'none';
        }
        toggleSortBar(true); 
        handleSearch(searchQuery);
    } else {
        toggleSortBar(false); 
        renderGrid(currentProducts);
    }
    
    if (savedScroll) {
        setTimeout(() => {
            window.scrollTo({ top: parseInt(savedScroll), behavior: 'instant' });
        }, 100);
    }
    
    ITEMS_PER_LOAD = 12; 
    sessionStorage.removeItem(STORE_ID + 'homeScrollPos');
    sessionStorage.removeItem(STORE_ID + 'homeRenderCount');
    sessionStorage.removeItem(STORE_ID + 'homeSearchTerm');
    
    setupEventListeners();
}




// --- 3. SIDEBAR LOGIC ---
// --- 3. SIDEBAR LOGIC ---
// --- 3. SIDEBAR LOGIC ---
// --- 3. SIDEBAR LOGIC ---
// --- 3. SIDEBAR LOGIC ---
function renderSidebarMenu() {
    let typesMap = {};
    allProducts.forEach(p => {
        if (p.type) {
            if (!typesMap[p.type]) typesMap[p.type] = new Set();
            if (p.sub_type) typesMap[p.type].add(p.sub_type);
        }
    });
    
    const sidebar = document.getElementById('sidebar');
    sidebar.style.display = 'flex';
    sidebar.style.flexDirection = 'column';
    
    let html = `
        <div style="font-size:18px; font-weight:bold; color:var(--primary); padding-bottom:15px; border-bottom:1px solid #eee; margin-bottom:10px;">
            Categories
        </div>
        <div style="overflow-y: auto; flex-grow: 1;">
            <div class="menu-category active-cat" id="cat-all" onclick="filterByType('All', null, this)">
                All Products
            </div>`;
    
    for (const [type, subTypes] of Object.entries(typesMap)) {
        html += `
        <div class="menu-category" style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="filterByType('${type}', null, this.parentElement)" style="flex-grow:1;">${type}</span>
            <i class="ri-arrow-down-s-line" onclick="this.parentElement.classList.toggle('open')" style="padding:10px; margin:-10px;"></i>
        </div>
        <div class="sub-menu">`;
        subTypes.forEach(sub => { html += `<p onclick="filterByType('${type}', '${sub}', this)">${sub}</p>`; });
        html += `</div>`;
    }
    
    html += `</div>`; // Close scrollable div
    
    // --- DYNAMIC MINIMALIST ICONS FROM GLOBAL.JS ---
    let socialHtml = '';
    
    // Logic: Only add the anchor tag if the link is not empty in global.js
    if (typeof LINK_FACEBOOK !== 'undefined' && LINK_FACEBOOK) {
        socialHtml += `<a href="${LINK_FACEBOOK}" target="_blank" style="color:#666; text-decoration:none;"><i class="ri-facebook-circle-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    if (typeof LINK_YOUTUBE !== 'undefined' && LINK_YOUTUBE) {
        socialHtml += `<a href="${LINK_YOUTUBE}" target="_blank" style="color:#666; text-decoration:none;"><i class="ri-youtube-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    if (typeof LINK_TIKTOK !== 'undefined' && LINK_TIKTOK) {
        socialHtml += `<a href="${LINK_TIKTOK}" target="_blank" style="color:#666; text-decoration:none;"><i class="ri-tiktok-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    if (typeof LINK_PHONE !== 'undefined' && LINK_PHONE) {
        socialHtml += `<a href="tel:${LINK_PHONE}" style="color:#666; text-decoration:none;"><i class="ri-phone-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    if (typeof LINK_EMAIL !== 'undefined' && LINK_EMAIL) {
        socialHtml += `<a href="mailto:${LINK_EMAIL}" style="color:#666; text-decoration:none;"><i class="ri-mail-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    if (typeof LINK_MAPS !== 'undefined' && LINK_MAPS) {
        socialHtml += `<a href="${LINK_MAPS}" target="_blank" style="color:#666; text-decoration:none;"><i class="ri-map-pin-line" style="font-size:18px; vertical-align:middle;"></i></a>`;
    }
    
    if (socialHtml !== '') {
        html += `
        <div style="margin-top:auto; border-top:1px solid #eee; padding-top:15px; padding-bottom:10px;">
             <div style="display:flex; flex-direction:row; gap:12px; flex-wrap:wrap; justify-content:flex-start; align-items:center;">
                 ${socialHtml}
             </div>
        </div>`;
    }
    
    sidebar.innerHTML = html;
}

// --- NEW: RESET HOME VIEW FUNCTION ---
function resetHomeView() {
    // 1. Remove highlight from all sidebar elements
    document.querySelectorAll('.menu-category, .menu-category span, .sub-menu p').forEach(el => el.classList.remove('active-cat'));
    
    // 2. Highlight "All Products"
    const allCat = document.getElementById('cat-all');
    if (allCat) allCat.classList.add('active-cat');
    
    // 3. Reset Products
    currentProducts = [...allProducts];
    baseFilteredProducts = [...allProducts]; // Restore base state
    toggleSortBar(false);
    
    // 4. Hide Breadcrumb
    const breadcrumbContainer = document.getElementById('breadcrumb-container');
    if (breadcrumbContainer) breadcrumbContainer.style.display = 'none';
    
    // 5. Redraw Grid
    renderGrid(currentProducts);
}



// --- 3. SIDEBAR & BREADCRUMB LOGIC ---
function filterByType(type, subType = null, clickedElement = null, isFromSidebar = true) {
    // 1. Remove highlight from all elements
    document.querySelectorAll('.menu-category, .menu-category span, .sub-menu p').forEach(el => el.classList.remove('active-cat'));
    
    if (clickedElement) {
        // 2. Highlight the clicked element
        clickedElement.classList.add('active-cat');
        
        // AUTO-OPEN ACCORDION
        if (type !== 'All' && !subType && clickedElement.classList.contains('menu-category')) {
            clickedElement.classList.add('open');
        }
    }
    
    const breadcrumbContainer = document.getElementById('breadcrumb-container');
    
    // 3. Filter the products & Build Breadcrumb
    if (type === 'All') {
        currentProducts = [...allProducts];
        baseFilteredProducts = [...allProducts]; // Save current category base state
        toggleSortBar(false);
        if (breadcrumbContainer) breadcrumbContainer.style.display = 'none';
    } else if (subType) {
        currentProducts = allProducts.filter(p => p.type === type && p.sub_type === subType);
        baseFilteredProducts =[...currentProducts]; // Save current category base state
        toggleSortBar(true);
        
        if (breadcrumbContainer) {
            breadcrumbContainer.style.display = 'flex';
            breadcrumbContainer.innerHTML = `
                <i class="ri-home-5-line" style="cursor:pointer; font-size:16px; color:var(--primary);" onclick="resetHomeView()"></i>
                <i class="ri-arrow-right-s-line" style="color:#aaa;"></i>
                <span style="cursor:pointer; color:#666;" onclick="filterByType('${type}', null, null, false)">${type}</span>
                <i class="ri-arrow-right-s-line" style="color:#aaa;"></i>
                <span style="font-weight:bold; color:var(--primary);">${subType}</span>
            `;
        }
    } else {
        currentProducts = allProducts.filter(p => p.type === type);
        baseFilteredProducts = [...currentProducts]; // Save current category base state
        toggleSortBar(true);
        
        if (breadcrumbContainer) {
            breadcrumbContainer.style.display = 'flex';
            breadcrumbContainer.innerHTML = `
                <i class="ri-home-5-line" style="cursor:pointer; font-size:16px; color:var(--primary);" onclick="resetHomeView()"></i>
                <i class="ri-arrow-right-s-line" style="color:#aaa;"></i>
                <span style="font-weight:bold; color:var(--primary);">${type}</span>
            `;
        }
    }
    
    // 4. Redraw the grid
    renderGrid(currentProducts);
    
    // 5. Close sidebar
    if (isFromSidebar) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar && sidebar.classList.contains('active')) toggleMenu();
    }
}



// --- 4. SEARCH & SORT LOGIC ---
function toggleHomeSearch() {
    const brand = document.getElementById('home-brand');
    const icons = document.getElementById('home-header-icons');
    const searchBox = document.getElementById('home-search-input-box');
    const searchInput = document.getElementById('home-search-val');
    
    if (searchBox.style.display === 'flex') {
        searchBox.style.display = 'none';
        brand.style.display = 'flex';
        icons.style.display = 'flex';
        if (searchInput) searchInput.value = '';
        
        document.querySelectorAll('.sort-item').forEach(btn => btn.classList.remove('active'));
        const sortBtns = document.querySelectorAll('.sort-item');
        if (sortBtns.length > 0) sortBtns[0].classList.add('active');
        priceSortDir = 'none';
        handleSearch(''); 
    } else {
        searchBox.style.display = 'flex';
        brand.style.display = 'none';
        icons.style.display = 'none';
        if (searchInput) searchInput.focus();
    }
}

function handleSearch(directQuery = null) {
    const inputEl = document.getElementById('home-search-val');
    let query = directQuery || (inputEl ? inputEl.value : "");
    query = query.toLowerCase().trim();
    
    const breadcrumbContainer = document.getElementById('breadcrumb-container');
    
    if(!query) {
        currentProducts =[...allProducts];
        baseFilteredProducts = [...allProducts]; // Save base state
        toggleSortBar(false);
        if(breadcrumbContainer) breadcrumbContainer.style.display = 'none';
        renderGrid(currentProducts);
        return;
    }

    if(breadcrumbContainer) breadcrumbContainer.style.display = 'none'; 
    toggleSortBar(true);
    
    const queryTerms = query.split(' ').filter(t => t); 
    currentProducts = allProducts.filter(p => {
        const searchableString = `${p.name} ${(p.tags).join(' ')} ${(p.keywords).join(' ')} ${p.type} ${p.sub_type}`.toLowerCase();
        return queryTerms.every(term => isCloseMatch(term, searchableString));
    });
    
    baseFilteredProducts = [...currentProducts]; // Save search results base state
    renderGrid(currentProducts);
}


function handleSort(sortType, clickedElement) {
    document.querySelectorAll('.sort-item').forEach(btn => btn.classList.remove('active'));
    clickedElement.classList.add('active');
    const priceIcon = document.getElementById('price-icon');
    priceIcon.className = 'ri-expand-up-down-line';
    
    if (sortType === 'best_match') { 
        priceSortDir = 'none';
        // FIX: Restore products from the currently active category/search filter, NOT all products
        currentProducts = [...baseFilteredProducts]; 
    }
    else if (sortType === 'sales') { 
        currentProducts.sort((a, b) => (b.sold || 0) - (a.sold || 0)); 
        priceSortDir = 'none'; 
    }
    else if (sortType === 'price') {
        if (priceSortDir === 'asc') { currentProducts.sort((a, b) => b.price - a.price); priceSortDir = 'desc'; priceIcon.className = 'ri-arrow-down-line'; } 
        else { currentProducts.sort((a, b) => a.price - b.price); priceSortDir = 'asc'; priceIcon.className = 'ri-arrow-up-line'; }
    }
    renderGrid(currentProducts);
}


// --- 5. GRID DRAWING & INFINITE SCROLLING ---
// --- 5. GRID DRAWING & SMART IMAGE LOADING ---
function renderGrid(productsToDraw, append = false) {
    const grid = document.getElementById('grid');
    
    if (!append) {
        gridProducts = productsToDraw;
        renderedCount = 0;
        if (gridProducts.length === 0) {
            grid.innerHTML = `<p style="text-align:center; width: 100%; padding: 20px;">No products found.</p>`;
            return;
        }
        grid.innerHTML = `<div class="masonry-col" id="col-left"></div><div class="masonry-col" id="col-right"></div>`;
    }
    
    const leftCol = document.getElementById('col-left');
    const rightCol = document.getElementById('col-right');
    if (!leftCol || !rightCol) return;
    
    const nextBatch = gridProducts.slice(renderedCount, renderedCount + ITEMS_PER_LOAD);
    
    nextBatch.forEach((p, index) => {
        const globalIndex = renderedCount + index;
        
        // SMART LAZY LOADING: First 4 images load instantly, the rest wait.
        const lazyAttr = globalIndex < 4 ? 'loading="eager"' : 'loading="lazy"';
        
        // When the image finishes downloading, we remove the CSS pulse animation
        const cardHtml = `
            <a href="product.html?id=${p.id}" class="product-card">
                <img src="${p.images[0]}" alt="${p.name}" ${lazyAttr} onload="this.style.animation='none';">
                <div class="p-details">
                    <div class="p-title">${p.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <span class="p-price">BDT ${p.price}</span>
                            ${p.original_price ? `<span class="p-old-price">BDT ${p.original_price}</span>` : ''}
                        </div>
                        ${p.show_sold && p.sold > 0 ? `<div style="font-size:10px; color:#888;">${p.sold} sold</div>` : ''}
                    </div>
                </div>
            </a>`;
        
        if (globalIndex % 2 === 0) leftCol.insertAdjacentHTML('beforeend', cardHtml);
        else rightCol.insertAdjacentHTML('beforeend', cardHtml);
    });
    
    renderedCount += nextBatch.length;
}



// 5A. Infinite Scroll Listener
window.addEventListener('scroll', () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        if (renderedCount < gridProducts.length) renderGrid(gridProducts, true); 
    }
});

// --- 6. SAVE STATE BEFORE LEAVING PAGE ---
// This is the magic that remembers your scroll position when you click a product!
window.addEventListener('beforeunload', () => {
    sessionStorage.setItem(STORE_ID + 'homeScrollPos', window.scrollY);
    sessionStorage.setItem(STORE_ID + 'homeRenderCount', renderedCount);
    const searchInput = document.getElementById('home-search-val');
    if (searchInput && searchInput.value) {
        sessionStorage.setItem(STORE_ID + 'homeSearchTerm', searchInput.value);
    }
});

// --- 6. EVENT LISTENERS (FINAL FIXED HOME BUTTON) ---
// --- 6. EVENT LISTENERS (FINAL FIXED HOME BUTTON) ---
function setupEventListeners() {
    const homeSearch = document.getElementById('home-search-val');
    if (homeSearch) homeSearch.addEventListener('keyup', (e) => { if (e.key === 'Enter') handleSearch(); });
    
    const btns = document.querySelectorAll('.sort-item');
    if (btns.length >= 3) {
        btns[0].addEventListener('click', function() { handleSort('best_match', this); });
        btns[1].addEventListener('click', function() { handleSort('sales', this); });
        btns[2].addEventListener('click', function() { handleSort('price', this); });
    }
    
    // FIX: Make the Home button scroll to top AND reset category filtering
    const homeNavBtn = document.querySelector('.bottom-nav a[href="index.html"]');
    if (homeNavBtn) {
        homeNavBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Stop the page from reloading
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Smoothly glide to the top
            
            // RESET categories and breadcrumbs
            resetHomeView();
            
            // If they were searching, clear the search and reset the grid completely
            if (homeSearch && homeSearch.value) {
                toggleHomeSearch();
            }
        });
    }
}

initShop();
</script>
<script>
    // Sidebar toggle logic needed on Home page
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.querySelector('.sidebar-overlay').classList.toggle('active');
    }
</script>
